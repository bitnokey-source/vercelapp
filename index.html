/* ── Escáner de código de barras (cámara) ── */
function BarcodeScanner({onDetected,onClose}){
  const [elId]=useState(()=>'scanner-'+uid());
  const [err,setErr]=useState('');
  useEffect(()=>{
    if(typeof Html5Qrcode==='undefined'){ setErr('No se pudo cargar la librería de escaneo. Revisa tu conexión a internet.'); return; }
    let scanner=null, stopped=false, cancelled=false;
    (async()=>{
      try{
        scanner=new Html5Qrcode(elId);
        await scanner.start(
          {facingMode:'environment'},
          {fps:10,qrbox:{width:260,height:130}},
          (decodedText)=>{
            if(stopped||cancelled) return;
            stopped=true;
            scanner.stop().then(()=>scanner.clear()).catch(()=>{});
            onDetected(decodedText);
          },
          ()=>{}
        );
      }catch(e){ if(!cancelled) setErr('No se pudo acceder a la cámara. Revisa los permisos del navegador.'); }
    })();
    return ()=>{
      cancelled=true;
      if(scanner&&!stopped){
        stopped=true;
        try{ scanner.stop().then(()=>scanner.clear()).catch(()=>{}); }catch(e){}
      }
    };
  },[]);
  return <Modal title="📷 Escanear código de barras" onClose={onClose}>
    {err
      ?<div style={{fontSize:13,color:'#f87171',textAlign:'center',padding:'24px 0'}}>{err}</div>
      :<div id={elId} style={{width:'100%',borderRadius:10,overflow:'hidden',background:'#000'}}/>}
    <div style={{fontSize:11,color:'#64748b',textAlign:'center',marginTop:10}}>Apunta la cámara al código de barras del producto</div>
  </Modal>;
}

/* ── Login ── */
function Login(){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const handle=async()=>{
    const emailTrim=email.trim(), pwTrim=pw.trim();
    if(!emailTrim||!pwTrim){ setErr('Ingresa tu correo y contraseña'); return; }
    setErr(''); setLoading(true);
    try{
      await auth.signInWithEmailAndPassword(emailTrim,pwTrim);
    }catch(e){
      const map={
        'auth/unauthorized-domain':'Este dominio no está autorizado en Firebase (Authentication → Settings → Authorized domains).',
        'auth/operation-not-allowed':'El método de correo/contraseña no está activado en Firebase (Authentication → Sign-in method).',
        'auth/user-not-found':'No existe ningún usuario con ese correo en Firebase Authentication.',
        'auth/wrong-password':'Contraseña incorrecta.',
        'auth/invalid-email':'El formato del correo no es válido.',
        'auth/invalid-credential':'Correo o contraseña incorrectos, o el usuario no existe.',
        'auth/too-many-requests':'Demasiados intentos fallidos. Espera un momento e inténtalo de nuevo.',
        'auth/network-request-failed':'Sin conexión con Firebase. Revisa tu internet.',
        'auth/api-key-not-valid':'La API key de Firebase no es válida.',
      };
      setErr((map[e.code]||e.message||'Error desconocido')+' ['+(e.code||'sin código')+']');
    }
    setLoading(false);
  };
  return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28}}>
    <div style={{fontSize:48,marginBottom:6}}>🚚</div>
    <div style={{fontSize:24,fontWeight:800,marginBottom:2}}>Productos de la Costa</div>
    <div style={{fontSize:13,color:'#475569',marginBottom:36}}>Panel de administración</div>
    <div style={{width:'100%',maxWidth:340,background:'#1e293b',borderRadius:16,padding:24}}>
      <Lbl>Correo electrónico</Lbl>
      <Inp type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="correo@ejemplo.com" style={{marginBottom:12}} autoComplete="username"/>
      <Lbl>Contraseña</Lbl>
      <PwInp value={pw} onChange={e=>setPw(e.target.value)}/>
      {err&&<div style={{fontSize:12,color:'#f87171',marginBottom:10,textAlign:'center'}}>{err}</div>}
      <BFill onClick={handle} disabled={loading} style={{width:'100%',fontSize:14,padding:12,marginTop:4,opacity:loading?0.6:1}}>{loading?'Ingresando…':'Iniciar sesión →'}</BFill>
    </div>
  </div>;
}

/* ── Dashboard ── */
function Dashboard({notas,productos,creditos}){
  const hoy=new Date().toDateString();
  const vhoy=notas.filter(n=>new Date(n.fecha).toDateString()===hoy);
  const thoy=vhoy.reduce((s,n)=>s+n.total,0);
  const pend=creditos.filter(c=>c.saldo>0);
  const tcred=pend.reduce((s,c)=>s+c.saldo,0);
  const bajo=productos.filter(p=>p.stock<10);
  const bmap=notas.reduce((m,n)=>{ m[n.clienteId]=m[n.clienteId]||{nombre:n.clienteNombre,total:0,count:0}; m[n.clienteId].total+=n.total; m[n.clienteId].count+=1; return m; },{});
  const top=Object.values(bmap).sort((a,b)=>b.total-a.total).slice(0,5);
  const maxT=top[0]?.total||1;
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:14}}>📊 Dashboard</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <Card style={{gridColumn:'1/-1'}}>
        <div style={{fontSize:12,color:'#94a3b8'}}>Ventas hoy</div>
        <div style={{fontSize:30,fontWeight:800,color:'#38bdf8'}}>{fmt(thoy)}</div>
        <div style={{fontSize:11,color:'#64748b'}}>{vhoy.length} pedido(s)</div>
      </Card>
      <Card>
        <div style={{fontSize:11,color:'#94a3b8'}}>Créditos</div>
        <div style={{fontSize:20,fontWeight:700,color:'#f59e0b'}}>{fmt(tcred)}</div>
        <div style={{fontSize:11,color:'#64748b'}}>{pend.length} cliente(s)</div>
      </Card>
      <Card>
        <div style={{fontSize:11,color:'#94a3b8'}}>Stock bajo</div>
        <div style={{fontSize:20,fontWeight:700,color:'#ef4444'}}>{bajo.length}</div>
        <div style={{fontSize:11,color:'#64748b'}}>producto(s)</div>
      </Card>
    </div>
    {top.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>🏆 CLIENTES QUE MÁS COMPRAN</div>
      {top.map((b,i)=><div key={i} style={{marginBottom:10}}>
        <Row style={{justifyContent:'space-between',marginBottom:3}}>
          <span style={{fontSize:13,fontWeight:600}}>{b.nombre}</span>
          <Row style={{gap:6}}><Tag color="#64748b">{b.count} ped.</Tag><span style={{fontSize:13,fontWeight:700,color:'#38bdf8'}}>{fmt(b.total)}</span></Row>
        </Row>
        <div style={{background:'#0f172a',borderRadius:10,height:5}}>
          <div style={{background:'linear-gradient(90deg,#38bdf8,#818cf8)',borderRadius:10,height:5,width:`${(b.total/maxT*100).toFixed(0)}%`}}/>
        </div>
      </div>)}
    </Card>}
    {bajo.length>0&&<Card style={{borderLeft:'3px solid #ef4444'}}>
      <div style={{fontSize:12,color:'#ef4444',fontWeight:700,marginBottom:6}}>⚠️ Stock bajo</div>
      {bajo.map(p=><Row key={p.id} style={{justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:13}}>{p.nombre}</span><Tag color="#ef4444">{p.stock} {p.unidad}</Tag></Row>)}
    </Card>}
    {vhoy.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:8}}>PEDIDOS DE HOY</div>
      {vhoy.map(n=><Row key={n.id} style={{justifyContent:'space-between',paddingBottom:8,borderBottom:'1px solid #0f172a',marginBottom:4}}>
        <div><div style={{fontSize:13,fontWeight:600}}>{n.clienteNombre}</div><div style={{fontSize:11,color:'#64748b'}}>{n.items.length} prod. · {n.formaPago}</div></div>
        <span style={{fontWeight:700,color:'#38bdf8'}}>{fmt(n.total)}</span>

}

/* ── Historial de inventario ── */
function InventarioHistorial({onClose}){
  const [items,setItems]=useState(null);
  useEffect(()=>{
    const unsub=db.collection('inventario_historial').orderBy('fecha','desc').limit(200).onSnapshot(snap=>{
      setItems(snap.docs.map(d=>({id:d.id,...d.data()})));
    },()=>setItems([]));
    return unsub;
  },[]);
  return <Modal title="📋 Historial de inventario" onClose={onClose}>
    <div style={{fontSize:11,color:'#64748b',marginBottom:10}}>Solo cambios manuales de stock (altas y ajustes). No incluye descuentos automáticos por venta.</div>
    {items===null&&<div style={{fontSize:13,color:'#64748b',textAlign:'center',padding:'20px 0'}}>Cargando…</div>}
    {items&&items.length===0&&<div style={{fontSize:13,color:'#475569',textAlign:'center',padding:'20px 0'}}>Sin cambios registrados aún</div>}
    {items&&items.map(h=><div key={h.id} style={{paddingBottom:10,borderBottom:'1px solid #334155',marginBottom:10}}>
      <Row style={{justifyContent:'space-between',marginBottom:3}}>
        <span style={{fontWeight:700,fontSize:13}}>{h.productoNombre}</span>
        <Tag color={h.diferencia>=0?'#22c55e':'#ef4444'}>{h.diferencia>=0?'+':''}{h.diferencia}</Tag>
      </Row>
      <div style={{fontSize:12,color:'#94a3b8'}}>{h.stockAnterior} → {h.stockNuevo} unidades</div>
      <div style={{fontSize:12,color:'#cbd5e1',marginTop:2}}>Motivo: {h.motivo||'Sin especificar'}</div>
      <Row style={{justifyContent:'space-between',marginTop:4}}>
        <span style={{fontSize:11,color:'#64748b'}}>{h.usuarioNombre||h.usuarioEmail||'—'}</span>
        <span style={{fontSize:11,color:'#64748b'}}>{fDate(h.fecha)}</span>
      </Row>
    </div>)}
  </Modal>;
}

function Productos({productos,currentUser}){
  const isAdmin=currentUser?.role==='admin';
  const [sel,setSel]=useState([]);
  const [q,setQ]=useState('');
  const [form,setForm]=useState(null);
  const [scanOpen,setScanOpen]=useState(false);
  const [saving,setSaving]=useState(false);
  const [histOpen,setHistOpen]=useState(false);
  const list=productos.filter(p=>p.nombre.toLowerCase().includes(q.toLowerCase()));
  const allSel=list.length>0&&sel.length===list.length;
  const togSel=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const togAll=()=>setSel(allSel?[]:list.map(p=>p.id));
  const delSel=async()=>{
    await Promise.all(sel.map(id=>db.collection('productos').doc(id).delete()));
    setSel([]);
  };
  const logInventario=(productoId,productoNombre,stockAnterior,stockNuevo,motivo)=>{
    if(stockAnterior===stockNuevo) return Promise.resolve();
    return db.collection('inventario_historial').add({
      productoId,productoNombre,stockAnterior,stockNuevo,diferencia:stockNuevo-stockAnterior,
      motivo:motivo||'Sin especificar',
      usuarioNombre:currentUser?.nombre||'',usuarioEmail:currentUser?.email||'',
      fecha:new Date().toISOString()
    });
  };
  const save=async()=>{
    if(!form.nombre||form.precio===''||form.precio===undefined){ alert('Nombre y precio son obligatorios'); return; }
    setSaving(true);
    const nuevoStock=+form.stock||0;
    const item={nombre:form.nombre,precio:+form.precio,stock:nuevoStock,unidad:form.unidad,codigoBarras:form.codigoBarras||''};
    if(form.codigoBarras){
      const existente=productos.find(p=>p.codigoBarras===form.codigoBarras&&p.id!==form.id);
      if(existente){ alert(`❌ El código de barras "${form.codigoBarras}" ya está asignado a "${existente.nombre}"`); setSaving(false); return; }
    }
    try{
      if(form.id){
        const anterior=productos.find(p=>p.id===form.id);
        await db.collection('productos').doc(form.id).update(item);
        if(anterior) await logInventario(form.id,form.nombre,anterior.stock,nuevoStock,form.motivo);
      }else{
        const ref=await db.collection('productos').add(item);
        await logInventario(ref.id,form.nombre,0,nuevoStock,form.motivo||'Alta de producto');
      }
      setForm(null);
    }catch(e){ alert('Error al guardar: '+e.message); }
    setSaving(false);
  };
  return <div style={{padding:'16px 12px'}}>
    <Row style={{justifyContent:'space-between',marginBottom:12}}>
      <div style={{fontSize:20,fontWeight:800}}>📦 Productos</div>
      <Row style={{gap:6}}>
        {isAdmin&&<BOut onClick={()=>setHistOpen(true)}>📋 Historial</BOut>}
        <BFill onClick={()=>setForm({nombre:'',precio:'',stock:'',unidad:'',codigoBarras:'',motivo:''})}>+ Nuevo</BFill>
      </Row>
    </Row>
    <Inp placeholder="🔍 Buscar..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
    {sel.length>0&&<Row style={{marginBottom:10,background:'#450a0a',borderRadius:8,padding:'8px 12px'}}>
      <span style={{flex:1,fontSize:13,color:'#fca5a5'}}>{sel.length} seleccionado(s)</span>
      <BOut onClick={delSel} color="#ef4444">🗑 Eliminar</BOut>
    </Row>}
    <Row style={{paddingLeft:4,marginBottom:6}}>
      <button onClick={togAll} style={{background:'none',border:'none',color:allSel?'#38bdf8':'#94a3b8',cursor:'pointer',padding:0,display:'flex'}}>
        {allSel?<ChkSq/>:<SqI/>}
      </button>
      <span style={{fontSize:11,color:'#64748b'}}>Seleccionar todos</span>
    </Row>
    {list.map(p=><Card key={p.id} style={{display:'flex',alignItems:'flex-start',gap:10}}>
      <button onClick={()=>togSel(p.id)} style={{background:'none',border:'none',color:sel.includes(p.id)?'#38bdf8':'#475569',cursor:'pointer',padding:0,marginTop:2,flexShrink:0,display:'flex'}}>
        {sel.includes(p.id)?<ChkSq/>:<SqI/>}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700,fontSize:14}}>{p.nombre}</span>
          <span style={{fontWeight:800,color:'#38bdf8',fontSize:14}}>{fmt(p.precio)}</span>
        </Row>
        <Row style={{marginTop:4}}><Tag color={p.stock<10?'#ef4444':'#22c55e'}>{p.stock} {p.unidad}</Tag></Row>
        {p.codigoBarras&&<div style={{fontSize:10,color:'#475569',marginTop:3}}>🏷️ {p.codigoBarras}</div>}
      </div>
      <Row style={{gap:4,flexShrink:0}}>
        <button onClick={()=>setForm({...p,precio:String(p.precio),stock:String(p.stock),codigoBarras:p.codigoBarras||'',motivo:''})} style={{background:'#172554',border:'none',color:'#60a5fa',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>✏️</button>
        <button onClick={()=>db.collection('productos').doc(p.id).delete()} style={{background:'#450a0a',border:'none',color:'#f87171',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>🗑</button>
      </Row>
    </Card>)}
    {form&&<Modal title={form.id?'Editar Producto':'Nuevo Producto'} onClose={()=>setForm(null)}>
      <Lbl>Nombre</Lbl>
      <Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Row style={{gap:10,marginBottom:10}}>
        <div style={{flex:1}}><Lbl>Precio ($)</Lbl><Inp type="number" value={form.precio} onChange={e=>setForm(f=>({...f,precio:e.target.value}))}/></div>
        <div style={{flex:1}}><Lbl>Stock</Lbl><Inp type="number" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/></div>
      </Row>
      <Lbl>Unidad</Lbl>
      <Inp value={form.unidad} onChange={e=>setForm(f=>({...f,unidad:e.target.value}))} placeholder="garrafón, bolsa…" style={{marginBottom:10}}/>
      <Lbl>Código de barras</Lbl>
      <Row style={{gap:8,marginBottom:10}}>
        <Inp value={form.codigoBarras||''} onChange={e=>setForm(f=>({...f,codigoBarras:e.target.value}))} placeholder="Escanea o escribe el código" style={{flex:1}}/>
        <BOut onClick={()=>setScanOpen(true)} style={{flexShrink:0,padding:'8px 12px'}}>📷</BOut>
      </Row>
      <Lbl>Motivo del cambio de inventario (opcional)</Lbl>
      <Inp value={form.motivo||''} onChange={e=>setForm(f=>({...f,motivo:e.target.value}))} placeholder="Ej. compra a proveedor, merma, conteo físico…" style={{marginBottom:6}}/>
      <div style={{fontSize:11,color:'#64748b',marginBottom:16}}>Se registra en el historial de inventario si cambias la cantidad de stock.</div>
      <BFill onClick={save} style={{width:'100%'}} disabled={saving}>{saving?'Guardando…':'💾 Guardar'}</BFill>
    </Modal>}
    {scanOpen&&<BarcodeScanner onDetected={code=>{setForm(f=>({...f,codigoBarras:code}));setScanOpen(false);}} onClose={()=>setScanOpen(false)}/>}
    {histOpen&&<InventarioHistorial onClose={()=>setHistOpen(false)}/>}
  </div>;
}

/* ── Clientes ── */
function Clientes({clientes,notas,creditos}){
  const [filtro,setFiltro]=useState('activos');
  const [q,setQ]=useState('');
  const [form,setForm]=useState(null);
  const [histId,setHistId]=useState(null);
  const cmap=creditos.reduce((m,c)=>{ if(c.saldo>0)m[c.clienteId]=(m[c.clienteId]||0)+c.saldo; return m; },{});
  const list=clientes
    .filter(c=>filtro==='activos'?c.activo:filtro==='inactivos'?!c.activo:!!cmap[c.id])
    .filter(c=>c.nombre.toLowerCase().includes(q.toLowerCase()));
  const save=async()=>{
    if(!form.nombre) return;
    const item={nombre:form.nombre,telefono:form.telefono||'',domicilio:form.domicilio||'',activo:form.activo!==undefined?form.activo:true};
    if(form.id) await db.collection('clientes').doc(form.id).update(item);
    else await db.collection('clientes').add(item);
    setForm(null);
  };
  return <div style={{padding:'16px 12px'}}>
    <Row style={{justifyContent:'space-between',marginBottom:12}}>
      <div style={{fontSize:20,fontWeight:800}}>👥 Clientes</div>
      <BFill onClick={()=>setForm({nombre:'',telefono:'',domicilio:''})}>+ Nuevo</BFill>
    </Row>
    <Inp placeholder="🔍 Buscar…" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
    <Row style={{gap:6,marginBottom:12}}>
      {[['activos','Activos'],['credito','Crédito'],['inactivos','Inactivos']].map(([v,l])=>(
        <button key={v} onClick={()=>setFiltro(v)} style={{flex:1,padding:'7px 2px',borderRadius:8,border:'none',background:filtro===v?'#38bdf8':'#1e293b',color:filtro===v?'#0f172a':'#94a3b8',fontSize:11,fontWeight:700,cursor:'pointer'}}>{l}</button>
      ))}
    </Row>
    {list.map(c=><Card key={c.id} style={{opacity:c.activo?1:0.65}}>
      <Row style={{justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1,minWidth:0}}>
          <Row style={{flexWrap:'wrap',gap:4}}>
            <span style={{fontWeight:700,fontSize:14}}>{c.nombre}</span>
            {!c.activo&&<Tag color="#94a3b8">Inactivo</Tag>}
            {cmap[c.id]&&<Tag color="#f59e0b">💳 {fmt(cmap[c.id])}</Tag>}
          </Row>
          <div style={{fontSize:12,color:'#94a3b8',marginTop:3}}>📱 {c.telefono||'—'}</div>
          <div style={{fontSize:12,color:'#94a3b8'}}>📍 {c.domicilio||'—'}</div>
        </div>
        <div style={{display:'flex',gap:4,flexShrink:0}}>
          <button onClick={()=>setForm({...c})} style={{background:'#172554',border:'none',color:'#60a5fa',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>✏️</button>
          <button onClick={()=>db.collection('clientes').doc(c.id).update({activo:!c.activo})} style={{background:c.activo?'#450a0a':'#14532d',border:'none',color:c.activo?'#f87171':'#4ade80',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>{c.activo?'🚫':'✅'}</button>
          <button onClick={()=>setHistId(histId===c.id?null:c.id)} style={{background:'#042f2e',border:'none',color:'#34d399',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>📋</button>
        </div>
      </Row>
      {histId===c.id&&<div style={{marginTop:10,borderTop:'1px solid #334155',paddingTop:8}}>
        <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:6}}>HISTORIAL DE PEDIDOS</div>
        {notas.filter(n=>n.clienteId===c.id).length===0
          ?<div style={{fontSize:12,color:'#475569'}}>Sin pedidos aún</div>
          :notas.filter(n=>n.clienteId===c.id).map(n=><Row key={n.id} style={{justifyContent:'space-between',fontSize:12,paddingBottom:5,borderBottom:'1px solid #0f172a',marginBottom:4,flexWrap:'wrap',gap:4}}>
            <span style={{color:'#64748b'}}>{fDate(n.fecha)}</span>
            <span style={{flex:1,paddingLeft:4}}>{n.items.length} prod.</span>
            <span style={{color:'#38bdf8',fontWeight:700}}>{fmt(n.total)}</span>
            <Tag color={n.formaPago==='credito'?'#f59e0b':'#22c55e'}>{n.formaPago}</Tag>
          </Row>)
        }
      </div>}
    </Card>)}
    {form&&<Modal title={form.id?'Editar Cliente':'Nuevo Cliente'} onClose={()=>setForm(null)}>
      <Lbl>Nombre</Lbl><Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Lbl>Teléfono</Lbl><Inp type="tel" value={form.telefono} onChange={e=>setForm(f=>({...f,telefono:e.target.value}))} style={{marginBottom:10}}/>
      <Lbl>Domicilio</Lbl><Inp value={form.domicilio} onChange={e=>setForm(f=>({...f,domicilio:e.target.value}))} style={{marginBottom:16}}/>
      <BFill onClick={save} style={{width:'100%'}}>💾 Guardar</BFill>
    </Modal>}
  </div>;
}

/* ── Crear Nota ── */
function CrearNota({productos,clientes}){
  const [cliOpen,setCliOpen]=useState(true);
  const [prodOpen,setProdOpen]=useState(false);
  const [cliMode,setCliMode]=useState('buscar');
  const [cliSearch,setCliSearch]=useState('');
  const [cliSel,setCliSel]=useState(null);
  const [nuevoC,setNuevoC]=useState({nombre:'',telefono:''});
  const [cart,setCart]=useState([]);
  const [pago,setPago]=useState('contado');
  const [done,setDone]=useState(null);
  const [saving,setSaving]=useState(false);
  const cliFilt=clientes.filter(c=>c.activo&&c.nombre.toLowerCase().includes(cliSearch.toLowerCase()));
  const addCart=p=>setCart(c=>{ const ex=c.find(x=>x.id===p.id); return ex?c.map(x=>x.id===p.id?{...x,cant:x.cant+1}:x):[...c,{id:p.id,nombre:p.nombre,precio:p.precio,cant:1}]; });
  const updQty=(id,v)=>{ if(v<1){setCart(c=>c.filter(x=>x.id!==id));return;} setCart(c=>c.map(x=>x.id===id?{...x,cant:v}:x)); };
  const total=cart.reduce((s,x)=>s+x.precio*x.cant,0);
  const cliente=cliMode==='nuevo'?nuevoC:cliSel;
  const canSave=cliente?.nombre&&cart.length>0;
  const makeWA=(cl,items,tot,fp)=>{
    const lines=items.map(x=>`• ${x.nombre} x${x.cant} = ${fmt(x.precio*x.cant)}`).join('\n');
    const text=`🧾 *PEDIDO*\n👤 ${cl.nombre}\n\n${lines}\n\n💰 *Total: ${fmt(tot)}*\nPago: ${fp}`;
    let telefono=(cl.telefono||'').replace(/\D/g,'');
    if(!telefono.startsWith('52')&&telefono.length<=10) telefono='52'+telefono;
    return `https://wa.me/${telefono}?text=${encodeURIComponent(text)}`;
  };
  const guardar=async()=>{
    if(!canSave) return;
    setSaving(true);
    try{
      const stockErrors=[];
      cart.forEach(item=>{
        const producto=productos.find(p=>p.id===item.id);
        if(!producto||producto.stock<item.cant) stockErrors.push(`${item.nombre} (disponible: ${producto?.stock||0}, solicitado: ${item.cant})`);
      });
      if(stockErrors.length>0){ alert('❌ Stock insuficiente:\n'+stockErrors.join('\n')); setSaving(false); return; }
      let cl=cliSel;
      if(cliMode==='nuevo'){
        const ref=await db.collection('clientes').add({nombre:nuevoC.nombre,telefono:nuevoC.telefono||'',domicilio:'',activo:true});
        cl={id:ref.id,nombre:nuevoC.nombre,telefono:nuevoC.telefono||''};
      }
      const nota={fecha:new Date().toISOString(),clienteId:cl.id,clienteNombre:cl.nombre,clienteTelefono:cl.telefono||'',items:cart.map(x=>({...x})),total,formaPago:pago};
      const notaRef=await db.collection('notas').add(nota);
      if(pago==='credito') await db.collection('creditos').add({notaId:notaRef.id,clienteId:cl.id,clienteNombre:cl.nombre,fecha:nota.fecha,total,saldo:total,abonos:[]});
      const batch=db.batch();
      cart.forEach(item=>{
        batch.update(db.collection('productos').doc(item.id),{stock:firebase.firestore.FieldValue.increment(-item.cant)});
      });
      await batch.commit();
      setDone({nota:{...nota,id:notaRef.id},cl});
      setCart([]); setCliSel(null); setNuevoC({nombre:'',telefono:''}); setCliMode('buscar');
    }catch(e){ alert('Error al guardar el pedido: '+e.message); }
    setSaving(false);
  };
  if(done) return <div style={{padding:24,textAlign:'center'}}>
    <div style={{fontSize:52,marginBottom:8}}>✅</div>
    <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Pedido guardado</div>
    <div style={{color:'#94a3b8',marginBottom:24}}>{done.cl.nombre} · {fmt(done.nota.total)}</div>
    {done.cl.telefono&&<BFill onClick={()=>window.open(makeWA(done.cl,done.nota.items,done.nota.total,done.nota.formaPago),'_blank')} bg="#25d366" style={{width:'100%',marginBottom:12,fontSize:15}}>📲 Enviar ticket por WhatsApp</BFill>}
    <BOut onClick={()=>setDone(null)} color="#38bdf8" style={{width:'100%'}}>+ Nuevo pedido</BOut>
  </div>;
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>🧾 Crear Pedido</div>
    <Card>
      <button onClick={()=>setCliOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700}}>👤 Cliente {((cliMode==='nuevo'&&nuevoC.nombre)||cliSel)?'✅':''}</span>
          {cliOpen?<CUp/>:<CDown/>}
        </Row>
        {!cliOpen&&cliSel&&<div style={{fontSize:12,color:'#38bdf8',marginTop:2}}>{cliSel.nombre} · {cliSel.telefono}</div>}
        {!cliOpen&&cliMode==='nuevo'&&nuevoC.nombre&&<div style={{fontSize:12,color:'#38bdf8',marginTop:2}}>{nuevoC.nombre}</div>}
      </button>
      {cliOpen&&<div style={{marginTop:12}}>
        <Row style={{gap:6,marginBottom:10}}>
          {[['buscar','Existente'],['nuevo','Nuevo']].map(([v,l])=>(
            <button key={v} onClick={()=>setCliMode(v)} style={{flex:1,padding:'7px',borderRadius:8,border:'none',background:cliMode===v?'#38bdf8':'#0f172a',color:cliMode===v?'#0f172a':'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
          ))}
        </Row>
        {cliMode==='buscar'?<>
          <Inp placeholder="Buscar cliente…" value={cliSearch} onChange={e=>setCliSearch(e.target.value)} style={{marginBottom:8}}/>
          <div style={{maxHeight:170,overflowY:'auto'}}>
            {cliFilt.map(c=><div key={c.id} onClick={()=>{setCliSel(c);setCliOpen(false);}} style={{padding:'9px 10px',borderRadius:8,cursor:'pointer',background:cliSel?.id===c.id?'#1e3a5f':'transparent',marginBottom:3}}>
              <div style={{fontWeight:600,fontSize:13}}>{c.nombre}</div>
              <div style={{fontSize:11,color:'#94a3b8'}}>📱 {c.telefono}</div>
            </div>)}
          </div>
        </>:<>
          <Inp placeholder="Nombre *" value={nuevoC.nombre} onChange={e=>setNuevoC(x=>({...x,nombre:e.target.value}))} style={{marginBottom:8}}/>
          <Inp placeholder="Teléfono" type="tel" value={nuevoC.telefono} onChange={e=>setNuevoC(x=>({...x,telefono:e.target.value}))}/>
        </>}
      </div>}
    </Card>
    <Card>
      <button onClick={()=>setProdOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700}}>📦 Productos {cart.length?`(${cart.reduce((s,x)=>s+x.cant,0)} artículos)`:''}</span>
          {prodOpen?<CUp/>:<CDown/>}
        </Row>
      </button>
      {prodOpen&&<div style={{marginTop:12,maxHeight:220,overflowY:'auto'}}>
        {productos.map(p=><Row key={p.id} style={{justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #0f172a'}}>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>{p.nombre}</div>
            <div style={{fontSize:11,color:'#38bdf8'}}>{fmt(p.precio)} / {p.unidad}</div>
          </div>
          <BFill onClick={()=>addCart(p)} style={{padding:'5px 12px',fontSize:12}}>+ Agregar</BFill>
        </Row>)}
      </div>}
    </Card>
    {cart.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>RESUMEN DEL PEDIDO</div>
      {cart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.nombre}</div>
          <div style={{fontSize:11,color:'#64748b'}}>{fmt(item.precio)} c/u</div>
        </div>
        <Row style={{gap:5,flexShrink:0}}>
          <button onClick={()=>updQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
          <input type="number" min="1" value={item.cant} onChange={e=>{ const v=e.target.value; if(v===''){return;} const n=parseInt(v); if(!isNaN(n)&&n>=1) updQty(item.id,n); }} onBlur={e=>{ if(!e.target.value||parseInt(e.target.value)<1) updQty(item.id,1); }} style={{width:44,textAlign:'center',fontWeight:700,fontSize:14,background:'#0f172a',border:'1px solid #334155',borderRadius:6,color:'#f1f5f9',padding:'4px 2px'}}/>
          <button onClick={()=>updQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
        </Row>
        <div style={{minWidth:62,textAlign:'right',fontWeight:700,color:'#38bdf8',fontSize:13}}>{fmt(item.precio*item.cant)}</div>
      </Row>)}
      <div style={{borderTop:'1px solid #334155',paddingTop:10,marginTop:4,marginBottom:12}}>
        <Row style={{justifyContent:'space-between'}}>
          <span style={{fontWeight:700,fontSize:15}}>Total</span>
          <span style={{fontSize:22,fontWeight:800,color:'#38bdf8'}}>{fmt(total)}</span>
        </Row>
      </div>
      <Row style={{gap:8,marginBottom:12}}>
        {[['contado','💵 Contado','#166534','#4ade80'],['credito','📋 Crédito','#78350f','#fcd34d']].map(([v,l,bg,col])=>(
          <button key={v} onClick={()=>setPago(v)} style={{flex:1,padding:'9px',borderRadius:8,border:'none',background:pago===v?bg:'#0f172a',color:pago===v?col:'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
        ))}
      </Row>
      <Row style={{gap:8}}>
        <BFill onClick={guardar} bg={canSave&&!saving?'#38bdf8':'#334155'} color={canSave&&!saving?'#0f172a':'#64748b'} style={{flex:1}} disabled={!canSave||saving}>{saving?'Guardando…':'💾 Guardar pedido'}</BFill>
        {cliente?.telefono&&<BFill onClick={()=>window.open(makeWA(cliente,cart,total,pago),'_blank')} bg="#25d366" style={{padding:'8px 16px',fontSize:18}}>📲</BFill>}
      </Row>
    </Card>}
  </div>;
}

/* ── Créditos ── */
function Creditos({creditos}){
  const [abonoId,setAbonoId]=useState(null);
  const [monto,setMonto]=useState('');
  const [savingAbono,setSavingAbono]=useState(false);
  const pend=creditos.filter(c=>c.saldo>0);
  const totalPend=pend.reduce((s,c)=>s+c.saldo,0);
  const abonar=async(c)=>{
    if(savingAbono) return;
    let m=parseFloat(monto); if(!m||m<=0) return;
    m=Math.min(m,c.saldo);
    setSavingAbono(true);
    try{
      await db.collection('creditos').doc(c.id).update({
        saldo:firebase.firestore.FieldValue.increment(-m),
        abonos:firebase.firestore.FieldValue.arrayUnion({fecha:new Date().toISOString(),monto:m})
      });
      setMonto(''); setAbonoId(null);
    }catch(e){ alert('Error al registrar abono: '+e.message); }
    setSavingAbono(false);
  };
  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>💳 Créditos</div>
    <Card style={{borderLeft:'3px solid #f59e0b',marginBottom:14}}>
      <div style={{fontSize:12,color:'#94a3b8'}}>Total pendiente</div>
      <div style={{fontSize:28,fontWeight:800,color:'#f59e0b'}}>{fmt(totalPend)}</div>
      <div style={{fontSize:11,color:'#64748b'}}>{pend.length} cuenta(s)</div>
    </Card>
    {pend.length===0&&<div style={{textAlign:'center',color:'#475569',fontSize:14,paddingTop:20}}>Sin créditos pendientes ✅</div>}
    {pend.map(c=><Card key={c.id}>
      <Row style={{justifyContent:'space-between',marginBottom:8}}>
        <div><div style={{fontWeight:700,fontSize:14}}>{c.clienteNombre}</div><div style={{fontSize:11,color:'#64748b'}}>{fDate(c.fecha)}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:18,fontWeight:800,color:'#f59e0b'}}>{fmt(c.saldo)}</div><div style={{fontSize:11,color:'#64748b'}}>de {fmt(c.total)}</div></div>
      </Row>
      <div style={{background:'#0f172a',borderRadius:10,height:6,marginBottom:10}}>
        <div style={{background:'#22c55e',borderRadius:10,height:6,width:`${Math.round((c.total-c.saldo)/c.total*100)}%`}}/>
      </div>
      {c.abonos.length>0&&<div style={{marginBottom:10,paddingTop:6,borderTop:'1px solid #334155'}}>
        <div style={{fontSize:11,color:'#64748b',marginBottom:4,fontWeight:700}}>ABONOS</div>
        {c.abonos.map((a,i)=><Row key={i} style={{justifyContent:'space-between',fontSize:12,marginBottom:3}}>
          <span style={{color:'#94a3b8'}}>{fDate(a.fecha)}</span>
          <span style={{color:'#22c55e',fontWeight:700}}>+{fmt(a.monto)}</span>
        </Row>)}
      </div>}
      {abonoId===c.id?<Row style={{gap:8}}>
        <Inp type="number" placeholder="Monto abono…" value={monto} onChange={e=>setMonto(e.target.value)} style={{flex:1}}/>
        <BFill onClick={()=>abonar(c)} bg="#22c55e" color="#0f172a" style={{padding:'8px 14px',opacity:savingAbono?0.6:1}} disabled={savingAbono}>{savingAbono?'…':'✓'}</BFill>
        <button onClick={()=>{setAbonoId(null);setMonto('');}} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',display:'flex'}}><XI size={18}/></button>
      </Row>:<BOut onClick={()=>setAbonoId(c.id)} color="#22c55e" style={{width:'100%'}}>+ Registrar abono</BOut>}
    </Card>)}
  </div>;
}

/* ── Ruta de reparto ── */
function RutaReparto({productos,clientes,rutas}){
  const [scanOpen,setScanOpen]=useState(false);
  const [cart,setCart]=useState([]);
  const [msg,setMsg]=useState('');
  const [manualOpen,setManualOpen]=useState(false);
  const [manualSearch,setManualSearch]=useState('');
  const [entOpen,setEntOpen]=useState(false);
  const [cliMode,setCliMode]=useState('buscar');
  const [cliSearch,setCliSearch]=useState('');
  const [cliSel,setCliSel]=useState(null);
  const [nuevoC,setNuevoC]=useState({nombre:'',telefono:''});
  const [entCart,setEntCart]=useState([]);
  const [pago,setPago]=useState('contado');
  const [saving,setSaving]=useState(false);
  const [expandId,setExpandId]=useState(null);
  const flash=m=>{ setMsg(m); setTimeout(()=>setMsg(''),2500); };
  const rutaActiva=rutas.find(r=>r.estado==='activa');
  const historial=rutas.filter(r=>r.id!==rutaActiva?.id);

  /* ── Cargar camión (escaneo o manual) ── */
  const addToCart=p=>{
    setCart(c=>{
      const ex=c.find(x=>x.id===p.id);
      return ex?c.map(x=>x.id===p.id?{...x,cant:x.cant+1}:x):[...c,{id:p.id,nombre:p.nombre,unidad:p.unidad,cant:1}];
    });
    flash('✅ '+p.nombre+' agregado');
  };
  const handleScan=code=>{
    setScanOpen(false);
    const p=productos.find(x=>x.codigoBarras&&x.codigoBarras===code);
    if(!p){ flash('⚠️ Código no encontrado: '+code); return; }
    addToCart(p);
  };
  const updQty=(id,v)=>{ if(v<1){setCart(c=>c.filter(x=>x.id!==id));return;} setCart(c=>c.map(x=>x.id===id?{...x,cant:v}:x)); };
  const guardarRuta=async()=>{
    if(cart.length===0) return;
    setSaving(true);
    try{
      const batch=db.batch();
      const itemsMap={};
      cart.forEach(item=>{
        batch.update(db.collection('productos').doc(item.id),{stock:firebase.firestore.FieldValue.increment(-item.cant)});
        itemsMap[item.id]={nombre:item.nombre,unidad:item.unidad,cantCargada:item.cant,cantRestante:item.cant};
      });
      const rutaRef=db.collection('rutas').doc();
      batch.set(rutaRef,{fecha:new Date().toISOString(),estado:'activa',items:itemsMap,entregas:[]});
      await batch.commit();
      setCart([]); flash('✅ Camión cargado — ruta iniciada');
    }catch(e){ flash('❌ Error al guardar la ruta: '+e.message); }
    setSaving(false);
  };

  /* ── Registrar entrega dentro de la ruta activa ── */
  const cliFilt=clientes.filter(c=>c.activo&&c.nombre.toLowerCase().includes(cliSearch.toLowerCase()));
  const disponibles=rutaActiva?Object.entries(rutaActiva.items).filter(([id,it])=>it.cantRestante>0):[];
  const addEnt=(id,it)=>{
    const prod=productos.find(p=>p.id===id);
    setEntCart(c=>{
      const ex=c.find(x=>x.id===id);
      if(ex) return ex.cant<it.cantRestante?c.map(x=>x.id===id?{...x,cant:x.cant+1}:x):c;
      return [...c,{id,nombre:it.nombre,unidad:it.unidad,precio:prod?prod.precio:0,cant:1,max:it.cantRestante}];
    });
  };
  const updEntQty=(id,v)=>{
    if(!v||v<1){ setEntCart(c=>c.filter(x=>x.id!==id)); return; }
    setEntCart(c=>c.map(x=>x.id===id?{...x,cant:Math.min(v,x.max)}:x));
  };
  const clienteEnt=cliMode==='nuevo'?nuevoC:cliSel;
  const canSaveEnt=clienteEnt?.nombre&&entCart.length>0;
  const guardarEntrega=async()=>{
    if(!canSaveEnt||!rutaActiva) return;
    setSaving(true);
    try{
      let cl=cliSel;
      if(cliMode==='nuevo'){
        const ref=await db.collection('clientes').add({nombre:nuevoC.nombre,telefono:nuevoC.telefono||'',domicilio:'',activo:true});
        cl={id:ref.id,nombre:nuevoC.nombre,telefono:nuevoC.telefono||''};
      }
      const total=entCart.reduce((s,x)=>s+x.precio*x.cant,0);
      const items=entCart.map(x=>({id:x.id,nombre:x.nombre,precio:x.precio,cant:x.cant}));
      const batch=db.batch();
      const notaRef=db.collection('notas').doc();
      batch.set(notaRef,{fecha:new Date().toISOString(),clienteId:cl.id,clienteNombre:cl.nombre,clienteTelefono:cl.telefono||'',items,total,formaPago:pago,rutaId:rutaActiva.id});
      if(pago==='credito'){
        batch.set(db.collection('creditos').doc(),{notaId:notaRef.id,clienteId:cl.id,clienteNombre:cl.nombre,fecha:new Date().toISOString(),total,saldo:total,abonos:[]});
      }
      const rutaUpdate={ entregas: firebase.firestore.FieldValue.arrayUnion({id:notaRef.id,fecha:new Date().toISOString(),clienteNombre:cl.nombre,total,formaPago:pago,items}) };
      entCart.forEach(x=>{ rutaUpdate[`items.${x.id}.cantRestante`]=firebase.firestore.FieldValue.increment(-x.cant); });
      batch.update(db.collection('rutas').doc(rutaActiva.id),rutaUpdate);
      await batch.commit();
      setEntCart([]); setCliSel(null); setNuevoC({nombre:'',telefono:''}); setCliMode('buscar'); setEntOpen(false);
      flash('✅ Entrega registrada a '+cl.nombre);
    }catch(e){ flash('❌ Error al guardar la entrega: '+e.message); }
    setSaving(false);
  };
  const cerrarRuta=async()=>{
    if(!rutaActiva) return;
    if(!confirm('¿Cerrar esta ruta? Ya no podrás registrar más entregas en ella.')) return;
    await db.collection('rutas').doc(rutaActiva.id).update({estado:'cerrada'});
    flash('🏁 Ruta cerrada');
  };

  return <div style={{padding:'16px 12px'}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>🚚 Ruta de reparto</div>
    {msg&&<div style={{background:'#14532d',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#4ade80',marginBottom:12}}>{msg}</div>}

    {!rutaActiva&&<>
      <Card>
        <BFill onClick={()=>setScanOpen(true)} style={{width:'100%',fontSize:14,padding:12}}>📷 Escanear producto</BFill>
        <div style={{fontSize:11,color:'#64748b',marginTop:8,textAlign:'center'}}>Escanea cada producto que subas al camión; se descuenta del inventario del almacén.</div>
      </Card>
      <Card>
        <button onClick={()=>setManualOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
          <Row style={{justifyContent:'space-between'}}>
            <span style={{fontWeight:700}}>➕ Agregar manualmente</span>
            {manualOpen?<CUp/>:<CDown/>}
          </Row>
        </button>
        {manualOpen&&<div style={{marginTop:12}}>
          <Inp placeholder="🔍 Buscar producto…" value={manualSearch} onChange={e=>setManualSearch(e.target.value)} style={{marginBottom:8}}/>
          <div style={{maxHeight:220,overflowY:'auto'}}>
            {productos.filter(p=>p.nombre.toLowerCase().includes(manualSearch.toLowerCase())).map(p=><Row key={p.id} style={{justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #0f172a'}}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{p.nombre}</div>
                <div style={{fontSize:11,color:'#64748b'}}>Stock almacén: {p.stock} {p.unidad}</div>
              </div>
              <BFill onClick={()=>addToCart(p)} style={{padding:'5px 12px',fontSize:12}}>+ Agregar</BFill>
            </Row>)}
          </div>
        </div>}
      </Card>
      {cart.length>0&&<Card>
        <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>PRODUCTOS ESCANEADOS ({cart.reduce((s,x)=>s+x.cant,0)})</div>
        {cart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600}}>{item.nombre}</div>
            <div style={{fontSize:11,color:'#64748b'}}>{item.unidad}</div>
          </div>
          <Row style={{gap:5}}>
            <button onClick={()=>updQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>-</button>
            <input type="number" min="1" value={item.cant} onChange={e=>{ const v=e.target.value; if(v===''){return;} const n=parseInt(v); if(!isNaN(n)&&n>=1) updQty(item.id,n); }} onBlur={e=>{ if(!e.target.value||parseInt(e.target.value)<1) updQty(item.id,1); }} style={{width:44,textAlign:'center',fontWeight:700,fontSize:14,background:'#0f172a',border:'1px solid #334155',borderRadius:6,color:'#f1f5f9',padding:'4px 2px'}}/>
            <button onClick={()=>updQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:26,height:26,cursor:'pointer',fontSize:15}}>+</button>
          </Row>
        </Row>)}
        <BFill onClick={guardarRuta} style={{width:'100%',marginTop:6}} disabled={saving}>{saving?'Guardando…':'🚚 Iniciar ruta con este cargamento'}</BFill>
      </Card>}
    </>}

    {rutaActiva&&<>
      <Card style={{borderLeft:'3px solid #38bdf8'}}>
        <Row style={{justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontWeight:700,fontSize:14}}>📦 Camión cargado</span>
          <Tag color="#38bdf8">Ruta activa</Tag>
        </Row>
        {Object.entries(rutaActiva.items).map(([id,it])=><Row key={id} style={{justifyContent:'space-between',marginBottom:4}}>
          <span style={{fontSize:13}}>{it.nombre}</span>
          <span style={{fontSize:12,color:it.cantRestante===0?'#475569':'#94a3b8'}}>{it.cantRestante} / {it.cantCargada} {it.unidad}</span>
        </Row>)}
        <BOut onClick={cerrarRuta} color="#ef4444" style={{width:'100%',marginTop:10}}>🏁 Cerrar ruta</BOut>
      </Card>

      <Card>
        <button onClick={()=>setEntOpen(o=>!o)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
          <Row style={{justifyContent:'space-between'}}>
            <span style={{fontWeight:700}}>➕ Registrar entrega</span>
            {entOpen?<CUp/>:<CDown/>}
          </Row>
        </button>
        {entOpen&&<div style={{marginTop:12}}>
          <Lbl>Cliente</Lbl>
          <Row style={{gap:6,marginBottom:10}}>
            {[['buscar','Existente'],['nuevo','Nuevo']].map(([v,l])=>(
              <button key={v} onClick={()=>setCliMode(v)} style={{flex:1,padding:'7px',borderRadius:8,border:'none',background:cliMode===v?'#38bdf8':'#0f172a',color:cliMode===v?'#0f172a':'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
            ))}
          </Row>
          {cliMode==='buscar'?<>
            <Inp placeholder="Buscar cliente…" value={cliSearch} onChange={e=>setCliSearch(e.target.value)} style={{marginBottom:8}}/>
            <div style={{maxHeight:140,overflowY:'auto',marginBottom:10}}>
              {cliFilt.map(c=><div key={c.id} onClick={()=>setCliSel(c)} style={{padding:'9px 10px',borderRadius:8,cursor:'pointer',background:cliSel?.id===c.id?'#1e3a5f':'transparent',marginBottom:3}}>
                <div style={{fontWeight:600,fontSize:13}}>{c.nombre}</div>
                <div style={{fontSize:11,color:'#94a3b8'}}>📱 {c.telefono}</div>
              </div>)}
            </div>
          </>:<>
            <Inp placeholder="Nombre *" value={nuevoC.nombre} onChange={e=>setNuevoC(x=>({...x,nombre:e.target.value}))} style={{marginBottom:8}}/>
            <Inp placeholder="Teléfono" type="tel" value={nuevoC.telefono} onChange={e=>setNuevoC(x=>({...x,telefono:e.target.value}))} style={{marginBottom:10}}/>
          </>}

          <Lbl>Productos disponibles en el camión</Lbl>
          <div style={{maxHeight:180,overflowY:'auto',marginBottom:10}}>
            {disponibles.length===0&&<div style={{fontSize:12,color:'#475569'}}>Sin inventario disponible en el camión.</div>}
            {disponibles.map(([id,it])=><Row key={id} style={{justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #0f172a'}}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{it.nombre}</div>
                <div style={{fontSize:11,color:'#64748b'}}>Disponibles: {it.cantRestante} {it.unidad}</div>
              </div>
              <BFill onClick={()=>addEnt(id,it)} style={{padding:'5px 12px',fontSize:12}}>+ Agregar</BFill>
            </Row>)}
          </div>

          {entCart.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:8}}>PRODUCTOS DE ESTA ENTREGA</div>
            {entCart.map(item=><Row key={item.id} style={{justifyContent:'space-between',marginBottom:8}}>
              <div style={{flex:1,minWidth:0,fontSize:13}}>{item.nombre}</div>
              <Row style={{gap:5}}>
                <button onClick={()=>updEntQty(item.id,item.cant-1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:24,height:24,cursor:'pointer',fontSize:14}}>-</button>
                <input type="number" min="1" max={item.max} value={item.cant} onChange={e=>{ const v=e.target.value; if(v===''){return;} const n=parseInt(v); if(!isNaN(n)&&n>=1) updEntQty(item.id,n); }} onBlur={e=>{ if(!e.target.value||parseInt(e.target.value)<1) updEntQty(item.id,1); }} style={{width:40,textAlign:'center',fontWeight:700,fontSize:13,background:'#0f172a',border:'1px solid #334155',borderRadius:6,color:'#f1f5f9',padding:'3px 2px'}}/>
                <button onClick={()=>updEntQty(item.id,item.cant+1)} style={{background:'#334155',border:'none',color:'#f1f5f9',borderRadius:6,width:24,height:24,cursor:'pointer',fontSize:14}}>+</button>
              </Row>
            </Row>)}
          </div>}

          <Row style={{gap:8,marginBottom:12}}>
            {[['contado','💵 Contado','#166534','#4ade80'],['credito','📋 Crédito','#78350f','#fcd34d']].map(([v,l,bg,col])=>(
              <button key={v} onClick={()=>setPago(v)} style={{flex:1,padding:'9px',borderRadius:8,border:'none',background:pago===v?bg:'#0f172a',color:pago===v?col:'#94a3b8',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
            ))}
          </Row>
          <BFill onClick={guardarEntrega} bg={canSaveEnt?'#38bdf8':'#334155'} color={canSaveEnt?'#0f172a':'#64748b'} style={{width:'100%'}} disabled={!canSaveEnt||saving}>{saving?'Guardando…':'💾 Guardar entrega'}</BFill>
        </div>}
      </Card>

      {rutaActiva.entregas?.length>0&&<Card>
        <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>ENTREGAS DE ESTA RUTA ({rutaActiva.entregas.length})</div>
        {rutaActiva.entregas.map((e,i)=><Row key={i} style={{justifyContent:'space-between',paddingBottom:8,borderBottom:'1px solid #0f172a',marginBottom:6}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{e.clienteNombre}</div><div style={{fontSize:11,color:'#64748b'}}>{e.items.length} prod. · {e.formaPago}</div></div>
          <span style={{fontWeight:700,color:'#38bdf8'}}>{fmt(e.total)}</span>
        </Row>)}
      </Card>}
    </>}

    {scanOpen&&<BarcodeScanner onDetected={handleScan} onClose={()=>setScanOpen(false)}/>}

    {historial.length>0&&<Card>
      <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:10}}>HISTORIAL DE RUTAS</div>
      {historial.map(r=><div key={r.id} style={{paddingBottom:8,borderBottom:'1px solid #0f172a',marginBottom:8}}>
        <button onClick={()=>setExpandId(expandId===r.id?null:r.id)} style={{background:'none',border:'none',color:'#f1f5f9',width:'100%',textAlign:'left',cursor:'pointer',padding:0}}>
          <Row style={{justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:12,color:'#94a3b8'}}>{fDate(r.fecha)}</span>
            <Row style={{gap:6}}>
              <Tag color={r.estado==='activa'?'#38bdf8':'#64748b'}>{r.estado||'cerrada'}</Tag>
              <Tag color="#22c55e">{(r.entregas||[]).length} entregas</Tag>
            </Row>
          </Row>
        </button>
        {expandId===r.id&&<div style={{marginTop:6}}>
          <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:4}}>CARGADO</div>
          {Array.isArray(r.items)
            ?r.items.map(it=><div key={it.id} style={{fontSize:12,color:'#cbd5e1'}}>• {it.nombre} x{it.cant}</div>)
            :Object.entries(r.items||{}).map(([id,it])=><div key={id} style={{fontSize:12,color:'#cbd5e1'}}>• {it.nombre} x{it.cantCargada} (quedan {it.cantRestante})</div>)
          }
          {(r.entregas||[]).length>0&&<>
            <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginTop:8,marginBottom:4}}>ENTREGAS</div>
            {r.entregas.map((e,i)=><Row key={i} style={{justifyContent:'space-between',fontSize:12,marginBottom:3}}>
              <span>{e.clienteNombre}</span><span style={{color:'#38bdf8',fontWeight:700}}>{fmt(e.total)}</span>
            </Row>)}
          </>}
        </div>}
      </div>)}
    </Card>}
  </div>;
}

/* ── Configuración ── */
function Configuracion({currentUser,onBack,onLogout}){
  const [sub,setSub]=useState('perfil');
  const [users,setUsersList]=useState([]);
  const [form,setForm]=useState(null);
  const [pw,setPw]=useState({old:'',new_:'',conf:''});
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');
  const isAdmin=currentUser.role==='admin';
  const flash=(m,isErr=false)=>{ isErr?setErr(m):setMsg(m); setTimeout(()=>{setErr('');setMsg('');},4000); };

  useEffect(()=>{
    if(!isAdmin) return;
    const unsub=db.collection('usuarios').onSnapshot(snap=>{
      setUsersList(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return unsub;
  },[isAdmin]);

  const changePw=async()=>{
    if(pw.new_.length<6){flash('Mínimo 6 caracteres',true);return;}
    if(pw.new_!==pw.conf){flash('Las contraseñas no coinciden',true);return;}
    try{
      const cred=firebase.auth.EmailAuthProvider.credential(currentUser.email,pw.old);
      await auth.currentUser.reauthenticateWithCredential(cred);
      await auth.currentUser.updatePassword(pw.new_);
      setPw({old:'',new_:'',conf:''}); flash('✅ Contraseña actualizada');
    }catch(e){ flash('Contraseña actual incorrecta',true); }
  };

  const saveUser=async()=>{
    if(!form.nombre||!form.email||(!form.id&&!form.password)){flash('Completa todos los campos',true);return;}
    try{
      if(form.id){
        await db.collection('usuarios').doc(form.id).update({nombre:form.nombre,role:form.role});
        flash('✅ Usuario actualizado');
      }else{
        if(form.password.length<6){flash('La contraseña debe tener mínimo 6 caracteres',true);return;}
        const secondary=firebase.apps.find(a=>a.name==='Secondary')||firebase.initializeApp(firebaseConfig,'Secondary');
        const secAuth=secondary.auth();
        const cred=await secAuth.createUserWithEmailAndPassword(form.email.trim(),form.password);
        await db.collection('usuarios').doc(cred.user.uid).set({nombre:form.nombre,email:form.email.trim(),role:form.role});
        await secAuth.signOut();
        flash('✅ Usuario creado');
      }
      setForm(null);
    }catch(e){ flash('Error: '+e.message,true); }
  };

  const delUser=async(u)=>{
    if(u.id===currentUser.uid){flash('No puedes eliminarte',true);return;}
    await db.collection('usuarios').doc(u.id).delete();
    flash('Perfil eliminado. Borra también la cuenta en Firebase Console → Authentication.');
  };

  return <div style={{padding:'16px 12px'}}>
    <Row style={{marginBottom:16}}>
      <button onClick={onBack} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:22,padding:'0 4px 0 0',lineHeight:1}}>←</button>
      <div style={{fontSize:20,fontWeight:800}}>⚙️ Configuración</div>
    </Row>
    {msg&&<div style={{background:'#14532d',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#4ade80',marginBottom:12}}>{msg}</div>}
    {err&&<div style={{background:'#450a0a',borderRadius:8,padding:'8px 12px',fontSize:13,color:'#fca5a5',marginBottom:12}}>{err}</div>}
    <Row style={{gap:6,marginBottom:16}}>
      {[['perfil','👤 Perfil'],['password','🔑 Contraseña'],...(isAdmin?[['usuarios','👥 Usuarios']]:[])].map(([v,l])=>(
        <button key={v} onClick={()=>{setSub(v);setErr('');setMsg('');}} style={{flex:1,padding:'8px 2px',borderRadius:8,border:'none',background:sub===v?'#38bdf8':'#1e293b',color:sub===v?'#0f172a':'#94a3b8',fontSize:11,fontWeight:700,cursor:'pointer'}}>{l}</button>
      ))}
    </Row>
    {sub==='perfil'&&<>
      <Card>
        <div style={{textAlign:'center',padding:'12px 0 16px'}}>
          <div style={{fontSize:52,marginBottom:8}}>👤</div>
          <div style={{fontSize:18,fontWeight:700}}>{currentUser.nombre}</div>
          <div style={{fontSize:13,color:'#94a3b8',marginTop:2}}>✉️ {currentUser.email}</div>
          <Tag color={currentUser.role==='admin'?'#a78bfa':'#38bdf8'} style={{marginTop:8,display:'inline-block'}}>{currentUser.role}</Tag>
        </div>
      </Card>
      <BOut onClick={onLogout} color="#ef4444" style={{width:'100%',marginTop:8}}>🚪 Cerrar sesión</BOut>
    </>}
    {sub==='password'&&<Card>
      <Lbl>Contraseña actual</Lbl><PwInp value={pw.old} onChange={e=>setPw(f=>({...f,old:e.target.value}))}/>
      <Lbl>Nueva contraseña</Lbl><PwInp value={pw.new_} onChange={e=>setPw(f=>({...f,new_:e.target.value}))}/>
      <Lbl>Confirmar</Lbl><PwInp value={pw.conf} onChange={e=>setPw(f=>({...f,conf:e.target.value}))}/>
      <BFill onClick={changePw} style={{width:'100%',marginTop:6}}>🔑 Actualizar contraseña</BFill>
    </Card>}
    {sub==='usuarios'&&isAdmin&&<>
      <Row style={{justifyContent:'flex-end',marginBottom:10}}>
        <BFill onClick={()=>setForm({nombre:'',email:'',password:'',role:'usuario'})}>+ Nuevo usuario</BFill>
      </Row>
      {users.map(u=><Card key={u.id}>
        <Row style={{justifyContent:'space-between'}}>
          <div>
            <Row style={{gap:6,flexWrap:'wrap'}}>
              <span style={{fontWeight:700,fontSize:14}}>{u.nombre}</span>
              <Tag color={u.role==='admin'?'#a78bfa':'#38bdf8'}>{u.role}</Tag>
              {u.id===currentUser.uid&&<Tag color="#22c55e">Tú</Tag>}
            </Row>
            <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>✉️ {u.email}</div>
          </div>
          <Row style={{gap:4}}>
            <button onClick={()=>setForm({id:u.id,nombre:u.nombre,email:u.email,role:u.role})} style={{background:'#172554',border:'none',color:'#60a5fa',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>✏️</button>
            {u.id!==currentUser.uid&&<button onClick={()=>delUser(u)} style={{background:'#450a0a',border:'none',color:'#f87171',borderRadius:6,padding:'5px 9px',cursor:'pointer'}}>🗑</button>}
          </Row>
        </Row>
      </Card>)}
    </>}
    {form&&<Modal title={form.id?'Editar Usuario':'Nuevo Usuario'} onClose={()=>{setForm(null);setErr('');}}>
      <Lbl>Nombre completo</Lbl><Inp value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} style={{marginBottom:10}}/>
      <Lbl>Correo electrónico</Lbl><Inp type="email" value={form.email} disabled={!!form.id} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="correo@ejemplo.com" style={{marginBottom:10,opacity:form.id?0.6:1}}/>
      {!form.id&&<><Lbl>Contraseña</Lbl><PwInp value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></>}
      <Lbl>Rol</Lbl>
      <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={{background:'#0f172a',border:'1px solid #334155',borderRadius:8,padding:'8px 10px',color:'#f1f5f9',fontSize:13,width:'100%',marginBottom:16}}>
        <option value="usuario">usuario</option><option value="admin">admin</option>
      </select>
      {form.id&&<div style={{fontSize:11,color:'#64748b',marginBottom:12}}>El correo y la contraseña solo los puede cambiar el propio usuario desde su pestaña de Contraseña.</div>}
      <BFill onClick={saveUser} style={{width:'100%'}}>💾 Guardar</BFill>
    </Modal>}
  </div>;
}

/* ── App Root ── */
function App(){
  const [tab,setTab]=useState('home');
  const [prevTab,setPrevTab]=useState('home');
  const [currentUser,setCurrentUser]=useState(null);
  const [productos,setProductos]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [notas,setNotas]=useState([]);
  const [creditos,setCreditos]=useState([]);
  const [rutas,setRutas]=useState([]);
  const [authChecked,setAuthChecked]=useState(false);
  const [firestoreError,setFirestoreError]=useState(null);

  // Autenticación: escucha sesión de Firebase y carga el perfil (usuarios/{uid})
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        try{
          const ref=db.collection('usuarios').doc(fbUser.uid);
          const snap=await ref.get();
          let perfil;
          if(snap.exists){
            perfil=snap.data();
          }else{
            // Primer inicio de sesión sin perfil: se crea como admin (útil para la primera cuenta)
            perfil={nombre:fbUser.email.split('@')[0],email:fbUser.email,role:'admin'};
            await ref.set(perfil);
          }
          setCurrentUser({uid:fbUser.uid,...perfil});
        }catch(e){ setCurrentUser({uid:fbUser.uid,nombre:fbUser.email,email:fbUser.email,role:'usuario'}); }
      }else{
        setCurrentUser(null);
      }
      setAuthChecked(true);
    });
    return unsub;
  },[]);

  // Suscripciones en tiempo real a Firestore (solo cuando hay sesión iniciada)
  useEffect(()=>{
    if(!currentUser) return;
    (async()=>{
      try{
        const seedRef=db.collection('_meta').doc('seed');
        const seedSnap=await seedRef.get();
        const seeded=seedSnap.exists?seedSnap.data():{};
        if(!seeded.productos){
          const batch=db.batch();
          S_PROD.forEach(p=>{ const {id,...rest}=p; batch.set(db.collection('productos').doc(),rest); });
          batch.set(seedRef,{productos:true},{merge:true});
          await batch.commit();
        }
        if(!seeded.clientes){
          const batch=db.batch();
          S_CLI.forEach(c=>{ const {id,...rest}=c; batch.set(db.collection('clientes').doc(),rest); });
          batch.set(seedRef,{clientes:true},{merge:true});
          await batch.commit();
        }
      }catch(e){ console.error('Error al sembrar datos iniciales',e); }
    })();
    const errorHandler=(err)=>{ console.error('Firestore error:',err); setFirestoreError('⚠️ Error de conexión con la base de datos. Revisa tus permisos.'); };
    const unsubs=[
      db.collection('productos').onSnapshot(snap=>{
        setProductos(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('clientes').onSnapshot(snap=>{
        setClientes(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('notas').orderBy('fecha','desc').limit(500).onSnapshot(snap=>{
        setNotas(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('creditos').onSnapshot(snap=>{
        setCreditos(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
      db.collection('rutas').orderBy('fecha','desc').limit(100).onSnapshot(snap=>{
        setRutas(snap.docs.map(d=>({id:d.id,...d.data()})));
      },errorHandler),
    ];
    return ()=>unsubs.forEach(u=>u());
  },[currentUser]);

  const goConfig=()=>{ if(tab!=='config') setPrevTab(tab); setTab('config'); };
  const logout=()=>{ auth.signOut(); setTab('home'); };
  const ctx={productos,clientes,notas,creditos,rutas};
  const TABS=[['home','🏠','Inicio'],['productos','📦','Productos'],['nota','🧾','Pedido'],['clientes','👥','Clientes'],['creditos','💳','Créditos'],['ruta','🚚','Ruta']];

  if(!authChecked) return <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:'100vh',color:'#94a3b8',fontSize:14}}>Cargando…</div>;
  if(!currentUser) return <Login/>;

  return <div style={{minHeight:'100vh',position:'relative',paddingTop:50,paddingBottom:tab==='config'?24:72}}>
    <div style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:420,background:'#0f172a',borderBottom:'1px solid #1e293b',zIndex:100,height:50,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',boxSizing:'border-box'}}>
      <div style={{fontSize:15,fontWeight:800,color:'#38bdf8'}}>🚚 Productos de la Costa</div>
      <Row style={{gap:6}}>
        <span style={{fontSize:12,color:'#475569'}}>Hola, {currentUser.nombre.split(' ')[0]}</span>
        <button onClick={goConfig} style={{background:tab==='config'?'#1e293b':'none',border:'none',color:tab==='config'?'#38bdf8':'#64748b',cursor:'pointer',borderRadius:8,padding:'5px 7px',display:'flex',alignItems:'center'}}>
          <Gear/>
        </button>
      </Row>
    </div>
    {firestoreError&&<div style={{margin:'0 12px 10px',background:'#450a0a',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#fca5a5'}}>{firestoreError}</div>}
    {tab==='home'&&<Dashboard {...ctx}/>}
    {tab==='productos'&&<Productos {...ctx} currentUser={currentUser}/>}
    {tab==='nota'&&<CrearNota {...ctx}/>}
    {tab==='clientes'&&<Clientes {...ctx}/>}
    {tab==='creditos'&&<Creditos {...ctx}/>}
    {tab==='ruta'&&<RutaReparto {...ctx}/>}
    {tab==='config'&&<Configuracion currentUser={currentUser} onBack={()=>setTab(prevTab)} onLogout={logout}/>}
    {tab!=='config'&&<nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:420,background:'#1e293b',borderTop:'1px solid #334155',display:'flex',zIndex:200}}>
      {TABS.map(([id,ico,lbl])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'10px 2px 7px',background:'none',border:'none',color:tab===id?'#38bdf8':'#64748b',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,fontSize:10,fontWeight:tab===id?700:400}}>
          <span style={{fontSize:22,lineHeight:1}}>{ico}</span>{lbl}
        </button>
      ))}
    </nav>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.warn('SW no se pudo registrar:', err));
    });
  }
</script>
</body>
</html>
